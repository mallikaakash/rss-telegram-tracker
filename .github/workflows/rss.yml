name: RSS Tracker

on:
  schedule:
    # 5 runs/day in IST: 07:17, 11:17, 15:17, 19:17, 23:17
    - cron: "47 1,3,5,7,9,11,13,15,17 * * *"
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: rss-tracker
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install feedparser requests pyyaml

      - name: Run tracker
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python tracker.py

      - name: Commit state + digests
        run: |
          git config user.name "rss-bot"
          git config user.email "bot@users.noreply.github.com"
          git add seen.json docs/
          git diff --cached --quiet || git commit -m "digest update [skip ci]"
          git push
