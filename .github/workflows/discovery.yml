name: Niche Discovery

on:
  schedule:
    # once/day at ~09:47 IST (04:17 UTC) - separate from the RSS tracker's schedule
    - cron: "17 4 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: niche-discovery
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests pyyaml

      - name: Run discovery
        env:
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python discovery.py

      - name: Commit state + digests
        run: |
          git config user.name "rss-bot"
          git config user.email "bot@users.noreply.github.com"
          git add discovery_articles.json docs/discovery/ 2>/dev/null || true
          git diff --cached --quiet || git commit -m "discovery update [skip ci]"
          git push
